services:
  mosquitto:
    build: ./mosquitto
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  influxdb:
    image: influxdb:2
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=festival
      - DOCKER_INFLUXDB_INIT_BUCKET=stroomdata
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2

  telegraf:
    build: ./telegraf
    container_name: telegraf
    restart: unless-stopped
    depends_on:
      - mosquitto
      - influxdb
    environment:
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - EVENT_EDITION=${EVENT_EDITION}

  grafana:
    build: ./grafana
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - influxdb
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=1s
    volumes:
      - grafana-data:/var/lib/grafana

  webapp:
    build: ./webapp
    container_name: webapp
    restart: unless-stopped
    depends_on:
      - influxdb
    ports:
      - "8080:8080"
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=festival
      - INFLUX_BUCKET=stroomdata
    volumes:
      - webapp-data:/data

  simulator:
    build: ./simulator
    container_name: simulator
    restart: unless-stopped
    depends_on:
      - mosquitto
      - webapp
    environment:
      - MQTT_URL=mqtt://mosquitto:1883
      - TOPOLOGY_URL=http://webapp:8080/api/topology
      - INTERVAL_MS=1000
      - PIEK_KANS=0.01

volumes:
  mosquitto-data:
  mosquitto-log:
  influxdb-data:
  grafana-data:
  webapp-data:
