services:
  mosquitto:
    build: ./mosquitto
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  influxdb:
    image: influxdb:2
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=festival
      - DOCKER_INFLUXDB_INIT_BUCKET=stroomdata
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2

  telegraf:
    build: ./telegraf
    container_name: telegraf
    restart: unless-stopped
    depends_on:
      - mosquitto
      - influxdb
    environment:
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - EVENT_EDITION=${EVENT_EDITION}
      - EVENT_NAME=${EVENT_NAME}

  # los renderer-service voor Grafana panel-screenshots, gebruikt door Grafana's eigen /render-
  # HTTP-endpoint (zie /api/rapport/* in webapp/server.js voor de PDF-rapportfunctie) — geen eigen
  # poort naar buiten nodig
  renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: renderer
    restart: unless-stopped
    environment:
      - RENDERING_MODE=clustered
      - RENDERING_CLUSTERING_MODE=browser
      - RENDERING_CLUSTERING_MAX_CONCURRENCY=5

  grafana:
    build: ./grafana
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - influxdb
      - renderer
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=1s
      - GF_INSTALL_PLUGINS=netsage-sankey-panel
      - GF_RENDERING_SERVER_URL=http://renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
    volumes:
      - grafana-data:/var/lib/grafana

  webapp:
    build: ./webapp
    container_name: webapp
    restart: unless-stopped
    depends_on:
      - influxdb
    ports:
      - "8080:8080"
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=festival
      - INFLUX_BUCKET=stroomdata
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_DASHBOARD_UID=stroomdashboard-overzicht
      - GRAFANA_REPORT_TOKEN=${GRAFANA_REPORT_TOKEN}
      - EVENT_NAME=${EVENT_NAME}
      - EVENT_EDITION=${EVENT_EDITION}
    volumes:
      - webapp-data:/data

  # alleen gestart met `docker compose --profile test up -d` — de webapp herkent zelf of deze
  # service bestaat (DNS-lookup op "simulator", zie isTestMode() in server.js) om de Testdata-tabblad
  # endpoints vrij te geven, dus dit ene commando is genoeg om testmodus aan/uit te zetten
  simulator:
    build: ./simulator
    container_name: simulator
    restart: unless-stopped
    profiles: ["test"]
    depends_on:
      - mosquitto
      - webapp
    environment:
      - MQTT_URL=mqtt://mosquitto:1883
      - TOPOLOGY_URL=http://webapp:8080/api/topology
      - INTERVAL_MS=1000
      - PIEK_KANS=0.01

volumes:
  mosquitto-data:
  mosquitto-log:
  influxdb-data:
  grafana-data:
  webapp-data:
