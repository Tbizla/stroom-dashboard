[agent]
  interval = "1s"
  flush_interval = "1s"

[global_tags]
  editie = "$EVENT_EDITION"
  evenement = "$EVENT_NAME"

# --- Input: live vermogensmetingen per fase (em:0) ---
[[inputs.mqtt_consumer]]
  name_override = "shelly_em"
  servers = ["tcp://mosquitto:1883"]
  topics = ["fest/+/+/status/em:0"]
  data_format = "json"
  json_strict = false

  # topic = fest/<generator>/<kast>/status/em:0
  # "_" = segment negeren, benoemde velden worden tags
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fest/+/+/status/em:0"
    tags = "_/generator/kast/_/_"

# --- Input: cumulatieve energietelling per fase (emdata:0) ---
[[inputs.mqtt_consumer]]
  name_override = "shelly_emdata"
  servers = ["tcp://mosquitto:1883"]
  topics = ["fest/+/+/status/emdata:0"]
  data_format = "json"
  json_strict = false

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fest/+/+/status/emdata:0"
    tags = "_/generator/kast/_/_"

# --- Output: InfluxDB v2 ---
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "$INFLUX_TOKEN"
  organization = "festival"
  bucket = "stroomdata"
